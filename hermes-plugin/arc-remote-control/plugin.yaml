name: arc-remote-control
version: 0.1.0
description: Stream agent events to an ARC relay for real-time remote observation and control via browser
author: agentrc.dev
requires_env: []
requires_pip:
  - websocket-client
provides_tools:
  - arc_start_session
  - arc_stop_session
provides_hooks:
  - pre_llm_call
  - pre_tool_call
  - post_tool_call
  - post_llm_call
  - on_session_start
  - on_session_end
