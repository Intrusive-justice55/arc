name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # Required for trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build setuptools-scm

      - name: Build package
        run: python -m build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python -c "from setuptools_scm import get_version; print(get_version())")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Package version: $PKG_VERSION"
          echo "Tag version:     $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Version mismatch"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing — configure at pypi.org/manage/project/arc-relay/settings/publishing/
        # No API token needed, just add the GitHub repo as a trusted publisher
