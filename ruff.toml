target-version = "py310"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long — let formatter handle it
    "B008",   # function call in default argument (FastAPI Depends pattern)
    "SIM102", # nested if — readability preference
    "SIM105", # contextlib.suppress — try/except/pass is clearer for async
    "SIM108", # ternary operator — readability preference
    "UP007",  # X | Y union syntax — keep Optional for py310 compat
    "RUF006", # store asyncio.create_task reference — not needed for long-running tasks
    "RUF022", # __all__ sorting — we group by category intentionally
]

[format]
quote-style = "double"
indent-style = "space"
