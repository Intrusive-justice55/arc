services:
  # ── OSS Relay (self-hosted) ─────────────────────────────────
  relay:
    build: ./relay
    ports:
      - "8600:8600"
    environment:
      - PORT=8600
      - MAX_TRACE_LOG=2000
      # REQUIRED: Set this to a strong random token. Agents must present this to register.
      # If not set, the server auto-generates one and logs it at startup.
      # - AGENT_TOKEN=your-strong-random-token
      # - ALLOWED_ORIGINS=https://yourdomain.com
      # - REQUIRE_TLS=true
